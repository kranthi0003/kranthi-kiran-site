  <!-- Lightbox (hidden until opened) -->
  <div id="photoLightbox" class="lightbox" aria-hidden="true" role="dialog" aria-label="Image viewer">
    <button class="lb-close" aria-label="Close (Esc)">&times;</button>
    <button class="lb-prev" aria-label="Previous image">‹</button>
    <div class="lb-index" aria-hidden="true">0 / 0</div>
    <a class="lb-download" href="#" download aria-hidden="true">Download</a>
    <div class="lb-content">
      <img class="lb-image" alt="" />
      <div class="lb-caption" aria-live="polite"></div>
    </div>
    <button class="lb-next" aria-label="Next image">›</button>
  </div>

  <footer style="text-align:center; padding:40px 0 80px; color:rgba(255,255,255,0.7);">
    <div class="container">
      <p style="opacity:0.8">© Kranthi Kiran — Photography</p>
    </div>
  </footer>

  <script>
    (function(){
      const gallery = Array.from(document.querySelectorAll('.photo-item'))
      const links = Array.from(document.querySelectorAll('.photo-link'))
      const lb = document.getElementById('photoLightbox')
      const lbImg = lb.querySelector('.lb-image')
      const lbCaption = lb.querySelector('.lb-caption')
      const btnClose = lb.querySelector('.lb-close')
      const btnPrev = lb.querySelector('.lb-prev')
      const btnNext = lb.querySelector('.lb-next')
  let current = -1
  const lbIndex = lb.querySelector('.lb-index')
  const lbDownload = lb.querySelector('.lb-download')

      function openAt(index){
        const item = gallery[index]
        if(!item) return
        const src = item.dataset.src || item.querySelector('a').href
        const caption = item.dataset.caption || ''
        lbImg.src = src
        lbImg.alt = caption || ''
        lbCaption.textContent = caption
  lb.classList.add('open')
        lb.setAttribute('aria-hidden', 'false')
        current = index
  lbIndex.textContent = (current + 1) + ' / ' + gallery.length
  lbDownload.href = src
  lbDownload.setAttribute('aria-hidden', 'false')
        document.body.style.overflow = 'hidden'
        btnClose.focus()
      }

      function close(){
        lb.classList.remove('open')
        lb.setAttribute('aria-hidden', 'true')
        lbImg.src = ''
        document.body.style.overflow = ''
        current = -1
      }

      function prev(){ openAt((current - 1 + gallery.length) % gallery.length) }
      function next(){ openAt((current + 1) % gallery.length) }

      links.forEach((a, i) => {
        a.addEventListener('click', (e) => {
          e.preventDefault()
          openAt(i)
        })
      })

  // ensure caption download links don't trigger opening the lightbox
  const captionDownloads = Array.from(document.querySelectorAll('.caption-download'))
  captionDownloads.forEach(a => a.addEventListener('click', (e) => e.stopPropagation()))

      btnClose.addEventListener('click', close)
      btnPrev.addEventListener('click', prev)
      btnNext.addEventListener('click', next)

      lb.addEventListener('click', (e) => {
        if(e.target === lb) close()
      })

      document.addEventListener('keydown', (e) => {
        if(current === -1) return
        if(e.key === 'Escape') close()
        else if(e.key === 'ArrowLeft') prev()
        else if(e.key === 'ArrowRight') next()
      })
    })()
  </script>
  <script>
    // Replace any broken gallery images with a neutral fallback so the page never shows raw broken links
    (function(){
      const fallback = 'https://picsum.photos/seed/fallback/800/600'
      document.querySelectorAll('.photo-gallery img').forEach(img => {
        // if image fails to load, swap to fallback and log the original for debugging
        img.addEventListener('error', function onErr() {
          console.warn('Gallery image failed to load, replacing with fallback:', img.src)
          img.removeEventListener('error', onErr)
          img.src = fallback
        })
      })
    })()
  </script>
